<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    font-family: 'Poppins', sans-serif;
    color: #00ff99;
    text-align: center;
    letter-spacing: 0.5px;
}

/* Background Glow */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,255,153,0.15), transparent 70%);
    z-index: -1;
}

.card {
    width: 360px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 15px;
    background: #0d0d0d;
    box-shadow: 0 0 40px #00ff99;
}

/* Profile Image */
.profile {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 4px solid #00ff99;
    object-fit: cover;
    box-shadow: 0 0 25px #00ff99;
}

/* Name */
h2 {
    margin: 15px 0 5px;
    letter-spacing: 2px;
}

/* Clean Text */
.tag {
    margin: 6px 0;
    font-size: 15px;
    letter-spacing: 1px;
    line-height: 1.6;
}

/* Typing Effect Fix */
.typing {
    display: inline-block;
    border-right: 2px solid #00ff99;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(25, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 180px }
}

@keyframes blink {
    50% { border-color: transparent }
}

/* Buttons */
.btn {
    display: block;
    margin: 12px auto;
    padding: 12px;
    width: 240px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Colors */
.whatsapp { background: #25D366; }
.telegram { background: #0088cc; }
.facebook { background: #1877f2; }
.gmail { background: #EA4335; }
